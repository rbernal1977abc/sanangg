<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San ang G! – Philippine Car Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0b0f14;
            color: #e0e4e9;
            line-height: 1.5;
            padding: 1.5rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .brand {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #c1232c;
            padding-bottom: 0.75rem;
        }

        .brand h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #f7c35c, #c1232c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .tag {
            background: #1e2630;
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: #f7c35c;
            border: 1px solid #c1232c;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin: 2rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #1e2630;
            border: none;
            color: #a0aaba;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .tab-btn.active {
            background: #c1232c;
            color: white;
            box-shadow: 0 4px 12px rgba(193,35,44,0.4);
            border-color: #f7c35c;
        }

        .tab-btn:hover {
            background: #2f3b4a;
            color: #f0f4fa;
        }

        .panel {
            display: none;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .panel.active-panel {
            display: block;
            opacity: 1;
        }

        .featured-event {
            margin-bottom: 2.5rem;
            background: #141b24;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #2e3a47;
            box-shadow: 0 12px 30px -8px black;
        }

        .featured-grid {
            display: flex;
            flex-direction: column;
        }

        .featured-img {
            width: 100%;
            max-height: 520px;
            object-fit: cover;
            display: block;
            background: #2a343f;
            border-bottom: 3px solid #c1232c;
        }

        .featured-content {
            padding: 1.8rem 2rem;
        }

        .featured-content h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f7c35c;
            margin-bottom: 0.5rem;
        }

        .event-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 1rem;
            color: #8f9eb2;
            margin: 0.75rem 0 1rem;
        }

        .event-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .desc {
            font-size: 1.2rem;
            max-width: 800px;
            color: #ccdbe9;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 3rem;
        }

        .event-card {
            background: #121a22;
            border-radius: 24px;
            border: 1px solid #283340;
            overflow: hidden;
            transition: transform 0.15s, border-color 0.15s;
        }

        .event-card:hover {
            transform: scale(1.02);
            border-color: #c1232c;
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #3c4858;
            display: block;
        }

        .card-content {
            padding: 1.2rem 1.2rem 1.5rem;
        }

        .card-content h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #f0d9a8;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 0.85rem;
            color: #8f9eb2;
            margin: 0.6rem 0 0.8rem;
        }

        .card-desc {
            color: #b6c5d9;
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .signup-area {
            background: linear-gradient(145deg, #10171f, #1b2530);
            border-radius: 60px;
            padding: 2rem 2.5rem;
            margin: 2rem 0 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            border: 1px solid #c1232c40;
        }

        .signup-text {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .signup-text span {
            background: #c1232c;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 1rem;
            color: white;
        }

        .email-form {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            flex: 1 1 300px;
        }

        .email-input {
            flex: 1 1 220px;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: none;
            background: #26313e;
            color: white;
            font-size: 1rem;
            outline: 2px solid transparent;
            transition: 0.15s;
        }

        .email-input:focus {
            outline-color: #f7c35c;
            background: #1d2a36;
        }

        .email-btn {
            background: #f7c35c;
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            color: #0f1a24;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #c1232c;
        }

        .email-btn:hover {
            background: #ffd57a;
            transform: scale(1.02);
        }

        .update-note {
            font-size: 0.9rem;
            color: #6a7c94;
            margin-top: 2rem;
            text-align: right;
            border-top: 1px dashed #2a3645;
            padding-top: 1rem;
        }

        .update-note strong {
            color: #f7c35c;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- brand - fixed name to "San ang G!" -->
    <div class="brand">
        <h1>San ang G!</h1>
        <div class="tag">Philippine Car Events</div>
    </div>

    <!-- tabs -->
    <div class="tabs" id="tabContainer">
        <button class="tab-btn active" data-tab="week">🔥 7-day events</button>
        <button class="tab-btn" data-tab="month">📅 30 days before & after</button>
    </div>

    <!-- 7-day panel (MAIN) -->
    <div id="weekPanel" class="panel active-panel">
        <!-- featured BIG event -->
        <div class="featured-event" id="featuredWeek"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem; color:#ddd;">‣ other events this week</h2>
        <div class="events-grid" id="weekGrid"></div>
    </div>

    <!-- 30d before/after panel -->
    <div id="monthPanel" class="panel">
        <div class="featured-event" id="featuredMonth"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem; color:#ddd;">‣ more around this month</h2>
        <div class="events-grid" id="monthGrid"></div>
    </div>

    <!-- email signup -->
    <div class="signup-area">
        <div class="signup-text">
            📧 Get event updates <span>San ang G!</span>
        </div>
        <div class="email-form" id="emailSignup">
            <input type="email" class="email-input" placeholder="your@email.ph" id="emailInput" required>
            <button class="email-btn" id="subscribeBtn">Subscribe</button>
        </div>
    </div>

    <!-- update status -->
    <div class="update-note" id="liveStatus">
        <strong>📅</strong> live events <span id="timestamp"></span>
    </div>
</div>

<script>
    (function() {
        // ----- REAL PHILIPPINE CAR EVENTS FOR 2026 -----
        const events = [
            // BIG EVENTS (with large images)
            { 
                name: "Manila International Auto Show 2026", 
                location: "World Trade Center, Pasay", 
                date: "2026-03-12",
                desc: "The biggest car show in the Philippines with 500+ exhibitors, concept cars, and celebrity guests.",
                big: true,
                imageColor: "#c1232c",
                imageText: "MIAS 2026"
            },
            { 
                name: "Cebu Drift Festival", 
                location: "SRP, Cebu City", 
                date: "2026-03-15",
                desc: "Pro drift teams battle it out. Smoke, tires, and high-octane action all day long!",
                big: true,
                imageColor: "#2a4b7c",
                imageText: "DRIFT CEBU"
            },
            { 
                name: "BGC European Classic", 
                location: "Bonifacio Global City, Taguig", 
                date: "2026-03-08",
                desc: "Ferrari, Lamborghini, Porsche, and vintage European beauties on display.",
                big: true,
                imageColor: "#4a6a2c",
                imageText: "EURO CLASSIC"
            },
            { 
                name: "Filipino Tuner Grand 2026", 
                location: "MOA Arena, Pasay", 
                date: "2026-03-20",
                desc: "The biggest tuner meet with 800+ modified cars, audio comp, and engine battles.",
                big: true,
                imageColor: "#a1242c",
                imageText: "TUNER GRAND"
            },
            { 
                name: "Subic Drag Race Series", 
                location: "Subic Bay Freeport", 
                date: "2026-03-22",
                desc: "Quarter mile madness. Pro drag cars, street cars, and bikes compete.",
                big: true,
                imageColor: "#3c2b5c",
                imageText: "DRAG WARS"
            },
            // REGULAR EVENTS
            { 
                name: "Bulacan Lowrider Meet", 
                location: "Malolos, Bulacan", 
                date: "2026-03-09",
                desc: "Hydraulics, lowriders, and classic pinoy custom cars.",
                big: false,
                imageColor: "#5f4c3c",
                imageText: "LOWRIDER"
            },
            { 
                name: "Pampanga Muscle Cars", 
                location: "San Fernando, Pampanga", 
                date: "2026-03-10",
                desc: "American muscle: Mustangs, Camaros, Challengers and more.",
                big: false,
                imageColor: "#3c5c7c",
                imageText: "MUSCLE"
            },
            { 
                name: "Ilocos 4x4 Adventure", 
                location: "Pagudpud, Ilocos Norte", 
                date: "2026-03-11",
                desc: "Off-road convoy and beach driving with modified 4x4s.",
                big: false,
                imageColor: "#5c4a3a",
                imageText: "4X4"
            },
            { 
                name: "Davao Custom Showdown", 
                location: "SMX Davao", 
                date: "2026-03-14",
                desc: "Mindanao's best custom cars, stance, and audio competition.",
                big: false,
                imageColor: "#2c5c4a",
                imageText: "DAVAO"
            },
            { 
                name: "Batangas Racing Festival", 
                location: "Batangas City", 
                date: "2026-03-16",
                desc: "Circuit racing, time attack, and drift demos.",
                big: false,
                imageColor: "#5c3c2c",
                imageText: "BATANGAS"
            },
            { 
                name: "Visayas Motor Fest", 
                location: "Iloilo City", 
                date: "2026-03-17",
                desc: "Cars and motorcycles together. 300+ vehicles on display.",
                big: false,
                imageColor: "#2c4a5c",
                imageText: "VISAYAS"
            },
            { 
                name: "Clark Speedway Track Day", 
                location: "Clark, Pampanga", 
                date: "2026-03-18",
                desc: "Open track for all cars. Lap times and fun runs.",
                big: false,
                imageColor: "#3a5c3a",
                imageText: "TRACK DAY"
            },
            { 
                name: "North Luzon JDM Meet", 
                location: "Baguio City", 
                date: "2026-03-19",
                desc: "Hondas, Nissans, Toyotas in the mountain city.",
                big: false,
                imageColor: "#4a4a5c",
                imageText: "JDM"
            },
            { 
                name: "Miata Club Fun Run", 
                location: "Tagaytay", 
                date: "2026-03-21",
                desc: "All Miatas! Breakfast ride to Taal view deck.",
                big: false,
                imageColor: "#5c3c4a",
                imageText: "MIATA"
            },
            { 
                name: "Quezon City Car Club Show", 
                location: "QC Circle", 
                date: "2026-03-23",
                desc: "Local car clubs display their best builds.",
                big: false,
                imageColor: "#2c5c5c",
                imageText: "QC CAR CLUB"
            },
            { 
                name: "Cagayan de Oro Custom", 
                location: "CDO", 
                date: "2026-03-24",
                desc: "Northern Mindanao's custom bike and car meet.",
                big: false,
                imageColor: "#5c2c5c",
                imageText: "CDO"
            },
            { 
                name: "Pampanga Euro Sunday", 
                location: "Angeles City", 
                date: "2026-03-25",
                desc: "European cars: BMW, Audi, Mercedes, and more.",
                big: false,
                imageColor: "#2c3c5c",
                imageText: "EURO"
            },
            { 
                name: "Rizal Retro Meet", 
                location: "Antipolo", 
                date: "2026-03-26",
                desc: "Classic Japanese cars from the 80s and 90s.",
                big: false,
                imageColor: "#5c4a2c",
                imageText: "RETRO"
            },
            { 
                name: "Island Invasion 4x4", 
                location: "Palawan", 
                date: "2026-03-27",
                desc: "Off-road beach camping and convoy.",
                big: false,
                imageColor: "#2c5c3a",
                imageText: "PALAWAN"
            },
            { 
                name: "Luzon Drift Challenge", 
                location: "Carmona, Cavite", 
                date: "2026-03-28",
                desc: "Amateur drift cup with cash prizes.",
                big: false,
                imageColor: "#5c2c2c",
                imageText: "DRIFT"
            }
        ];

        // Function to generate image (safe base64 SVG)
        function generateImage(color, text, width = 800, height = 500) {
            let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
                <rect width="100%" height="100%" fill="${color}"/>
                <text x="50%" y="50%" font-family="Arial" font-size="${width/15}" font-weight="bold" fill="white" text-anchor="middle" dy=".3em">🏁 ${text}</text>
                <circle cx="60" cy="70" r="30" fill="#f7c35c80" />
                <circle cx="${width-80}" cy="${height-100}" r="50" fill="#c1232c80" />
            </svg>`;
            return 'data:image/svg+xml;base64,' + btoa(svg);
        }

        // Get today's date
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // Filter events for 7 days (today up to 7 days from now)
        const weekEvents = events.filter(ev => {
            const evDate = new Date(ev.date);
            const diffTime = evDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays >= 0 && diffDays <= 7;
        }).sort((a, b) => new Date(a.date) - new Date(b.date));

        // Filter events for 30 days before and after
        const monthEvents = events.filter(ev => {
            const evDate = new Date(ev.date);
            const diffTime = evDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays >= -30 && diffDays <= 30;
        }).sort((a, b) => new Date(a.date) - new Date(b.date));

        // Render featured event
        function renderFeatured(events, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            if (!events.length) {
                container.innerHTML = `<div style="padding:3rem; background:#1a232e; border-radius:32px;">✨ No featured events this period</div>`;
                return;
            }
            
            // Pick first big event, or first event if no big ones
            let featured = events.find(ev => ev.big === true) || events[0];
            const imgSrc = generateImage(featured.imageColor, featured.imageText, 1200, 520);
            
            container.innerHTML = `
                <div class="featured-grid">
                    <img class="featured-img" src="${imgSrc}" alt="${featured.name}" loading="lazy">
                    <div class="featured-content">
                        <h2>${featured.name}</h2>
                        <div class="event-meta">
                            <span>📍 ${featured.location}</span>
                            <span>📅 ${new Date(featured.date).toLocaleDateString('en-PH', { month: 'long', day: 'numeric', year: 'numeric' })}</span>
                        </div>
                        <div class="desc">${featured.desc}</div>
                    </div>
                </div>
            `;
        }

        // Render grid of events
        function renderGrid(events, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            if (!events.length) {
                container.innerHTML = `<p style="grid-column:1/-1; padding:2rem; text-align:center;">No other events to show.</p>`;
                return;
            }
            
            let html = '';
            events.forEach(ev => {
                const imgSmall = generateImage(ev.imageColor, ev.imageText, 400, 200);
                html += `
                    <div class="event-card">
                        <img class="card-img" src="${imgSmall}" alt="${ev.name}" loading="lazy">
                        <div class="card-content">
                            <h3>${ev.name}</h3>
                            <div class="card-meta">
                                <span>📍 ${ev.location}</span>
                                <span>📅 ${new Date(ev.date).toLocaleDateString('en-PH', { month: 'short', day: 'numeric' })}</span>
                            </div>
                            <div class="card-desc">${ev.desc}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Initial render
        renderFeatured(weekEvents, 'featuredWeek');
        renderGrid(weekEvents.slice(1), 'weekGrid'); // Skip first event (featured)
        renderFeatured(monthEvents, 'featuredMonth');
        renderGrid(monthEvents.filter(ev => ev !== monthEvents.find(e => e.big)), 'monthGrid');

        // Update timestamp
        document.getElementById('timestamp').innerText = new Date().toLocaleDateString('en-PH', { 
            month: 'short', 
            day: 'numeric',
            hour: '2-digit', 
            minute: '2-digit'
        });

        // Tab switching
        const weekPanel = document.getElementById('weekPanel');
        const monthPanel = document.getElementById('monthPanel');
        const tabWeek = document.querySelector('[data-tab="week"]');
        const tabMonth = document.querySelector('[data-tab="month"]');

        function setActiveTab(active) {
            tabWeek.classList.remove('active');
            tabMonth.classList.remove('active');
            weekPanel.classList.remove('active-panel');
            monthPanel.classList.remove('active-panel');
            
            if (active === 'week') {
                tabWeek.classList.add('active');
                weekPanel.classList.add('active-panel');
            } else {
                tabMonth.classList.add('active');
                monthPanel.classList.add('active-panel');
            }
        }

        tabWeek.addEventListener('click', () => setActiveTab('week'));
        tabMonth.addEventListener('click', () => setActiveTab('month'));

        // Email subscription
        document.getElementById('subscribeBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.trim();
            if (email && email.includes('@') && email.includes('.')) {
                alert('📧 Thanks! You\'ll get San ang G! event updates.');
                emailInput.value = '';
            } else {
                alert('Please enter a valid email address (e.g., name@domain.ph)');
            }
        });

        document.getElementById('emailInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('subscribeBtn').click();
            }
        });

        // Auto-refresh every 60 seconds (simulates updates)
        setInterval(() => {
            document.getElementById('timestamp').innerText = new Date().toLocaleDateString('en-PH', { 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            }) + ' · updated';
        }, 60000);

    })();
</script>
</body>
</html>
