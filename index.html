<script>
    // Track analytics events (only if Vercel Analytics is loaded)
    function trackEvent(category, action, label) {
        if (typeof window.va !== 'undefined') {
            window.va('event', {
                name: action,
                data: {
                    category: category,
                    label: label
                }
            });
        }
    }

    // Calendar function with correct dates
    window.addToCalendar = function(name, dateRange, location, startDate, endDate) {
        const start = startDate.replace(/-/g, '');
        const end = endDate ? endDate.replace(/-/g, '') : start;
        const googleUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(name)}&dates=${start}/${end}&details=${encodeURIComponent(name + ' at ' + location)}&location=${encodeURIComponent(location)}`;
        
        // Track calendar click
        trackEvent('Calendar', 'add_to_calendar', name);
        
        window.open(googleUrl, '_blank', 'noopener,noreferrer');
        return false;
    };

    // VERIFIED PHILIPPINE CAR EVENTS - March-April 2026
    const events = [
        // UPCOMING (within 7 days from March 9, 2026)
        {

            big: true,

        },
        
        // UPCOMING (beyond 7 days)
        { 
            name: "Manila International Auto Show 2026", 
            location: "World Trade Center & PTTC, Pasay", 
            date: "April 9-12, 2026",
            desc: "The biggest car show in the Philippines with 500+ exhibitors, concept cars, and celebrity guests. Theme: 'Powering Mobility'.",
            longDesc: "The 2026 MIAS features the Mobility Marathon with new model launches, Test Drive Avenue, Truck Zone, Die-Cast Car Collection, Car Club Display, and the MIAS Petron Custom and Classic Car Competition. The PTTC returns as a secondary venue with nearly 100 additional vehicle displays and a dedicated food court. Connected to WTC via air-conditioned walkway.",
            big: true,
            image: "https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=1200&h=500&fit=crop",
            thumbnail: "https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=400&h=200&fit=crop",
            link: "https://manilaautoshow.com/",
            source: "Top Gear Philippines",
            sourceUrl: "https://www.topgear.com.ph/news/industry-news/mias-2026-pttc-new-venue-a2619-20260225",
            startDate: "2026-04-09",
            endDate: "2026-04-12",
            status: "upcoming"
        },
        
        // JUST ENDED (within 30 days before)
        { 
            name: "Ford Island Conquest - SM Clark", 
            location: "SM Clark, Angeles, Pampanga", 
            date: "March 6-8, 2026",
            desc: "Test drive Ford vehicles including Everest, Territory Hybrid, Mustang Mach-E, Bronco, and Ranger. Free admission.",
            longDesc: "Ford Philippines held the second leg of its Island Conquest test drive roadshow at SM Clark. Eventgoers could explore and test drive the Everest, Territory Hybrid, Mustang Mach-E, Bronco, and Ranger. Exclusive promos included cash discounts up to P100,000 and accessories packages. This event strengthened Ford's presence in North Luzon.",
            big: false,
            image: "https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=400&h=200&fit=crop",
            thumbnail: "https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=400&h=200&fit=crop",

        {

        },
        
        // UPCOMING LATER
        { 
            name: "Philippine International Motor Show 2026", 
            location: "World Trade Center, Pasay", 
            date: "June 4-7, 2026",
            desc: "The 10th PIMS, organized by CAMPI, featuring the latest models from all major manufacturers.",
            longDesc: "The biennial Philippine International Motor Show returns for its 10th edition. CAMPI members will showcase cutting-edge technologies, global models, and mobility solutions. Expected to be the biggest and most diverse PIMS yet with participation from all major automotive brands in the Philippines.",
            big: false,
            image: "https://images.unsplash.com/photo-1600712242805-3e374b0c6ffb?w=400&h=200&fit=crop",
            thumbnail: "https://images.unsplash.com/photo-1600712242805-3e374b0c6ffb?w=400&h=200&fit=crop",
            link: "https://www.campi.ph/",
            source: "AutoIndustriya",
            sourceUrl: "https://www.autoindustriya.com/auto-industry-news/philippine-international-motor-show-announced-for-june-2026.html",
            startDate: "2026-06-04",
            endDate: "2026-06-07",
            status: "upcoming"
        }
    ];

    // Helper to get status badge
    function getStatusBadge(status) {
        if (status === 'ongoing') return '<span class="status-badge status-ongoing">🔴 ONGOING</span>';
        if (status === 'upcoming') return '<span class="status-badge status-upcoming">⏳ UPCOMING</span>';
        if (status === 'ended') return '<span class="status-badge status-ended">✅ ENDED</span>';
        return '';
    }

    // Filter events by date range
    const today = new Date('2026-03-09'); // Current date
    const nextWeek = new Date('2026-03-16');
    const thirtyDaysAgo = new Date('2026-02-07');
    const thirtyDaysFromNow = new Date('2026-04-08');

    function parseEventDateRange(event) {
        const start = new Date(event.startDate);
        const end = new Date(event.endDate || event.startDate);
        return { start, end };
    }

    const weekEvents = events.filter(event => {
        const { start, end } = parseEventDateRange(event);
        // Event overlaps with next 7 days (March 9-16)
        return (start <= nextWeek && end >= today);
    }).sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

    const monthEvents = events.filter(event => {
        const { start, end } = parseEventDateRange(event);
        // Event overlaps with last 30 days or next 30 days (Feb 7 - Apr 8)
        return (start <= thirtyDaysFromNow && end >= thirtyDaysAgo);
    }).sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

    // Get featured events (prioritize ongoing/upcoming big events)
    const featuredWeek = weekEvents.find(ev => ev.big === true && ev.status !== 'ended') || weekEvents[0];
    const featuredMonth = monthEvents.find(ev => ev.big === true && ev.status !== 'ended') || monthEvents[1] || monthEvents[0];

    // Render featured event
    function renderFeatured(containerId, event) {
        const container = document.getElementById(containerId);
        if (!container || !event) return;
        
        container.innerHTML = `
            <div>
                <img class="featured-img" src="${event.image}" alt="${event.name}" onerror="this.src='https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=1200&h=500&fit=crop'">
                <div class="featured-content">
                    <h2>
                        ${event.name}
                        ${getStatusBadge(event.status)}
                    </h2>
                    <div class="event-meta">
                        <span><i class="fas fa-map-marker-alt"></i> ${event.location}</span>
                        <span><i class="fas fa-calendar"></i> ${event.date}</span>
                    </div>
                    <div class="desc">${event.longDesc || event.desc}</div>
                    <div class="source-info">
                        <i class="fas fa-newspaper"></i> Source: <a href="${event.sourceUrl}" target="_blank" rel="noopener noreferrer" onclick="trackEvent('Source', 'click', '${event.name}')">${event.source}</a>
                    </div>
                    <div class="event-actions">
                        <a href="${event.link}" target="_blank" rel="noopener noreferrer" class="action-btn info-btn" onclick="trackEvent('Website', 'click', '${event.name}'); event.stopPropagation();">
                            <i class="fas fa-external-link-alt"></i> Official Website
                        </a>
                        <a href="#" class="action-btn calendar-btn" onclick="addToCalendar('${event.name}', '${event.date}', '${event.location}', '${event.startDate}', '${event.endDate}'); event.preventDefault(); event.stopPropagation();">
                            <i class="fas fa-calendar-plus"></i> Add to Calendar
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    // Render grid
    function renderGrid(containerId, events, excludeFeatured = null) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        let eventsToShow = events;
        if (excludeFeatured) {
            eventsToShow = events.filter(ev => ev.name !== excludeFeatured.name);
        }
        
        if (!eventsToShow.length) {
            container.innerHTML = '<p style="grid-column:1/-1; padding:2rem; text-align:center;">No other verified events in this period.</p>';
            return;
        }
        
        let html = '';
        eventsToShow.slice(0, 8).forEach(ev => {
            html += `
                <div class="event-card">
                    <img class="card-img" src="${ev.thumbnail}" alt="${ev.name}" onerror="this.src='https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400&h=200&fit=crop'">
                    <div class="card-content">
                        <h3>${ev.name} ${getStatusBadge(ev.status)}</h3>
                        <div class="card-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
                            <span><i class="fas fa-calendar"></i> ${ev.date}</span>
                        </div>
                        <div class="card-desc">${ev.desc}</div>
                        <div class="card-source">
                            <i class="fas fa-newspaper"></i> ${ev.source}
                        </div>
                        <div class="card-actions">
                            <a href="${ev.link}" target="_blank" rel="noopener noreferrer" class="card-action-btn card-info-btn" onclick="trackEvent('Website', 'click', '${ev.name}'); event.stopPropagation();">
                                <i class="fas fa-external-link-alt"></i> Website
                            </a>
                            <a href="#" class="card-action-btn card-calendar-btn" onclick="addToCalendar('${ev.name}', '${ev.date}', '${ev.location}', '${ev.startDate}', '${ev.endDate}'); event.preventDefault(); event.stopPropagation();">
                                <i class="fas fa-calendar-plus"></i> Calendar
                            </a>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // Render everything
    if (featuredWeek) renderFeatured('featuredWeek', featuredWeek);
    if (featuredMonth) renderFeatured('featuredMonth', featuredMonth);
    renderGrid('weekGrid', weekEvents, featuredWeek);
    renderGrid('monthGrid', monthEvents, featuredMonth);

    // Track page view
    trackEvent('Navigation', 'page_view', 'home');

    // Tab switching with analytics
    document.getElementById('tabWeek').addEventListener('click', function() {
        document.getElementById('tabWeek').classList.add('active');
        document.getElementById('tabMonth').classList.remove('active');
        document.getElementById('weekPanel').classList.add('active-panel');
        document.getElementById('monthPanel').classList.remove('active-panel');
        trackEvent('Navigation', 'tab_switch', 'week_view');
    });

    document.getElementById('tabMonth').addEventListener('click', function() {
        document.getElementById('tabMonth').classList.add('active');
        document.getElementById('tabWeek').classList.remove('active');
        document.getElementById('monthPanel').classList.add('active-panel');
        document.getElementById('weekPanel').classList.remove('active-panel');
        trackEvent('Navigation', 'tab_switch', 'month_view');
    });

    // Email subscription with analytics
    document.getElementById('subscribeBtn').addEventListener('click', function() {
        const email = document.getElementById('emailInput').value.trim();
        if (email && email.includes('@') && email.includes('.')) {
            trackEvent('Subscription', 'signup', 'email_capture');
            alert('Thanks! You\'ll get Sumaan ang G! verified event updates.');
            document.getElementById('emailInput').value = '';
        } else {
            trackEvent('Subscription', 'failed', 'invalid_email');
            alert('Please enter a valid email address');
        }
    });

    document.getElementById('emailInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('subscribeBtn').click();
        }
    });
</script>
</body>
</html>
