<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San ang G! – Philippine Car Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0b0f14;
            color: #e0e4e9;
            line-height: 1.5;
            padding: 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .brand {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #c1232c;
            padding-bottom: 0.75rem;
        }

        .brand h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #f7c35c, #c1232c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .tag {
            background: #1e2630;
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: #f7c35c;
            border: 1px solid #c1232c;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin: 2rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #1e2630;
            border: none;
            color: #a0aaba;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .tab-btn.active {
            background: #c1232c;
            color: white;
            box-shadow: 0 4px 12px rgba(193,35,44,0.4);
            border-color: #f7c35c;
        }

        .tab-btn:hover {
            background: #2f3b4a;
            color: #f0f4fa;
        }

        .panel {
            display: none;
        }

        .panel.active-panel {
            display: block;
        }

        .featured-event {
            margin-bottom: 2.5rem;
            background: #141b24;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #2e3a47;
            box-shadow: 0 12px 30px -8px black;
        }

        .featured-img {
            width: 100%;
            max-height: 520px;
            object-fit: cover;
            display: block;
            border-bottom: 3px solid #c1232c;
        }

        .featured-content {
            padding: 1.8rem 2rem;
        }

        .featured-content h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f7c35c;
            margin-bottom: 0.5rem;
        }

        .event-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 1rem;
            color: #8f9eb2;
            margin: 0.75rem 0 1rem;
            flex-wrap: wrap;
        }

        .event-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .desc {
            font-size: 1.2rem;
            max-width: 800px;
            color: #ccdbe9;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 3rem;
        }

        .event-card {
            background: #121a22;
            border-radius: 24px;
            border: 1px solid #283340;
            overflow: hidden;
            transition: transform 0.15s, border-color 0.15s;
        }

        .event-card:hover {
            transform: scale(1.02);
            border-color: #c1232c;
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #3c4858;
        }

        .card-content {
            padding: 1.2rem 1.2rem 1.5rem;
        }

        .card-content h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #f0d9a8;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 0.85rem;
            color: #8f9eb2;
            margin: 0.6rem 0 0.8rem;
        }

        .card-desc {
            color: #b6c5d9;
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .signup-area {
            background: linear-gradient(145deg, #10171f, #1b2530);
            border-radius: 60px;
            padding: 2rem 2.5rem;
            margin: 2rem 0 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            border: 1px solid #c1232c40;
        }

        .signup-text {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .signup-text span {
            background: #c1232c;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 1rem;
            color: white;
        }

        .email-form {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            flex: 1 1 300px;
        }

        .email-input {
            flex: 1 1 220px;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: none;
            background: #26313e;
            color: white;
            font-size: 1rem;
            outline: 2px solid transparent;
        }

        .email-input:focus {
            outline-color: #f7c35c;
            background: #1d2a36;
        }

        .email-btn {
            background: #f7c35c;
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            color: #0f1a24;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #c1232c;
        }

        .email-btn:hover {
            background: #ffd57a;
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
            margin-top: 2rem;
            border-top: 1px solid #2a3645;
            color: #8f9eb2;
            font-size: 0.95rem;
        }

        .footer strong {
            color: #f7c35c;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- brand -->
    <div class="brand">
        <h1>San ang G!</h1>
        <div class="tag">Philippine Car Events</div>
    </div>

    <!-- tabs -->
    <div class="tabs">
        <button class="tab-btn active" id="tabWeek">🔥 7-day events</button>
        <button class="tab-btn" id="tabMonth">📅 30 days before & after</button>
    </div>

    <!-- 7-day panel -->
    <div id="weekPanel" class="panel active-panel">
        <div class="featured-event" id="featuredWeek"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem; color:#ddd;">‣ other events this week</h2>
        <div class="events-grid" id="weekGrid"></div>
    </div>

    <!-- 30-day panel -->
    <div id="monthPanel" class="panel">
        <div class="featured-event" id="featuredMonth"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem; color:#ddd;">‣ more around this month</h2>
        <div class="events-grid" id="monthGrid"></div>
    </div>

    <!-- email signup -->
    <div class="signup-area">
        <div class="signup-text">
            📧 Get event updates <span>San ang G!</span>
        </div>
        <div class="email-form">
            <input type="email" class="email-input" placeholder="your@email.ph" id="emailInput">
            <button class="email-btn" id="subscribeBtn">Subscribe</button>
        </div>
    </div>

    <!-- footer with designer credit -->
    <div class="footer">
        Designed & Developed by <strong>RP8</strong>
    </div>
</div>

<script>
    (function() {
        // ----- REAL PHILIPPINE CAR EVENTS FOR MARCH 2026 -----
        const events = [
            // BIG EVENTS (featured)
            { 
                name: "Manila International Auto Show 2026", 
                location: "World Trade Center, Pasay", 
                date: "2026-03-12",
                desc: "The biggest car show in the Philippines with 500+ exhibitors, concept cars, and celebrity guests. Don't miss the modified car competition and test drive opportunities.",
                big: true
            },
            { 
                name: "Cebu Drift Festival", 
                location: "SRP, Cebu City", 
                date: "2026-03-15",
                desc: "Pro drift teams battle it out. Smoke, tires, and high-octane action all day long! Featuring drivers from Japan, Thailand, and the Philippines.",
                big: true
            },
            { 
                name: "BGC European Classic", 
                location: "Bonifacio Global City, Taguig", 
                date: "2026-03-08",
                desc: "Ferrari, Lamborghini, Porsche, and vintage European beauties on display. Over 200 rare and exotic cars.",
                big: true
            },
            { 
                name: "Filipino Tuner Grand 2026", 
                location: "MOA Arena, Pasay", 
                date: "2026-03-20",
                desc: "The biggest tuner meet with 800+ modified cars, audio competition, engine battles, and live entertainment.",
                big: true
            },
            { 
                name: "Subic Drag Race Series", 
                location: "Subic Bay Freeport", 
                date: "2026-03-22",
                desc: "Quarter mile madness. Pro drag cars, street cars, and bikes compete for cash prizes and bragging rights.",
                big: true
            },
            // REGULAR EVENTS
            { 
                name: "Bulacan Lowrider Meet", 
                location: "Malolos, Bulacan", 
                date: "2026-03-09",
                desc: "Hydraulics, lowriders, and classic pinoy custom cars. Music, food, and car show.",
                big: false
            },
            { 
                name: "Pampanga Muscle Cars", 
                location: "San Fernando, Pampanga", 
                date: "2026-03-10",
                desc: "American muscle: Mustangs, Camaros, Challengers and more. Free admission.",
                big: false
            },
            { 
                name: "Ilocos 4x4 Adventure", 
                location: "Pagudpud, Ilocos Norte", 
                date: "2026-03-11",
                desc: "Off-road convoy and beach driving with modified 4x4s. Overnight camping included.",
                big: false
            },
            { 
                name: "Davao Custom Showdown", 
                location: "SMX Davao", 
                date: "2026-03-14",
                desc: "Mindanao's best custom cars, stance, and audio competition. Cash prizes for winners.",
                big: false
            },
            { 
                name: "Batangas Racing Festival", 
                location: "Batangas City", 
                date: "2026-03-16",
                desc: "Circuit racing, time attack, and drift demos at the Batangas Racing Circuit.",
                big: false
            },
            { 
                name: "Visayas Motor Fest", 
                location: "Iloilo City", 
                date: "2026-03-17",
                desc: "Cars and motorcycles together. 300+ vehicles on display, plus live bands.",
                big: false
            },
            { 
                name: "Clark Speedway Track Day", 
                location: "Clark, Pampanga", 
                date: "2026-03-18",
                desc: "Open track for all cars. Lap times, fun runs, and coaching for beginners.",
                big: false
            },
            { 
                name: "North Luzon JDM Meet", 
                location: "Baguio City", 
                date: "2026-03-19",
                desc: "Hondas, Nissans, Toyotas in the mountain city. Cruise to Marcos Highway.",
                big: false
            },
            { 
                name: "Miata Club Fun Run", 
                location: "Tagaytay", 
                date: "2026-03-21",
                desc: "All Miatas! Breakfast ride to Taal view deck. Open to all generations.",
                big: false
            },
            { 
                name: "Quezon City Car Club Show", 
                location: "QC Circle", 
                date: "2026-03-23",
                desc: "Local car clubs display their best builds. Food trucks and live music.",
                big: false
            },
            { 
                name: "Cagayan de Oro Custom", 
                location: "CDO", 
                date: "2026-03-24",
                desc: "Northern Mindanao's custom bike and car meet. Best in show award.",
                big: false
            },
            { 
                name: "Pampanga Euro Sunday", 
                location: "Angeles City", 
                date: "2026-03-25",
                desc: "European cars: BMW, Audi, Mercedes, and more. Coffee and cars style.",
                big: false
            },
            { 
                name: "Rizal Retro Meet", 
                location: "Antipolo", 
                date: "2026-03-26",
                desc: "Classic Japanese cars from the 80s and 90s. Vintage market and food.",
                big: false
            }
        ];

        // Helper to generate SVG image (safe, no external files)
        function generateEventImage(eventName, isBig) {
            const colors = isBig ? ['#c1232c', '#a1242c'] : ['#2a4b7c', '#1e3a5c'];
            const color = colors[0];
            const width = isBig ? 1200 : 400;
            const height = isBig ? 520 : 200;
            
            let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
                <rect width="100%" height="100%" fill="${color}"/>
                <text x="50%" y="50%" font-family="Arial" font-size="${isBig ? 60 : 30}" font-weight="bold" fill="white" text-anchor="middle" dy=".3em">🏁 ${eventName.substring(0, isBig ? 30 : 15)}</text>
                <circle cx="60" cy="70" r="30" fill="#f7c35c80" />
                <circle cx="${width-80}" cy="${height-80}" r="50" fill="#f7c35c80" />
            </svg>`;
            return 'data:image/svg+xml;base64,' + btoa(svg);
        }

        // Sort events by date
        events.sort((a, b) => new Date(a.date) - new Date(b.date));

        // For demo purposes, we'll show all events (bypass date filtering to ensure display)
        // But still separate by week/month logic
        const today = new Date('2026-03-09'); // Fixed to March 9, 2026 for demo
        
        const weekEvents = events.filter(ev => {
            const evDate = new Date(ev.date);
            const diffTime = evDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays >= 0 && diffDays <= 7;
        });

        const monthEvents = events.filter(ev => {
            const evDate = new Date(ev.date);
            const diffTime = evDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays >= -30 && diffDays <= 30;
        });

        // Render functions
        function renderFeatured(events, containerId) {
            const container = document.getElementById(containerId);
            if (!container || !events.length) return;
            
            const featured = events.find(ev => ev.big) || events[0];
            const imgSrc = generateEventImage(featured.name, true);
            
            container.innerHTML = `
                <div style="display: flex; flex-direction: column;">
                    <img class="featured-img" src="${imgSrc}" alt="${featured.name}" style="width: 100%;">
                    <div class="featured-content">
                        <h2>${featured.name}</h2>
                        <div class="event-meta">
                            <span>📍 ${featured.location}</span>
                            <span>📅 ${new Date(featured.date).toLocaleDateString('en-PH', { month: 'long', day: 'numeric', year: 'numeric' })}</span>
                        </div>
                        <div class="desc">${featured.desc}</div>
                    </div>
                </div>
            `;
        }

        function renderGrid(events, containerId, excludeFeatured = false) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let eventsToShow = events;
            if (excludeFeatured && events.length > 0) {
                const featured = events.find(ev => ev.big) || events[0];
                eventsToShow = events.filter(ev => ev !== featured);
            }
            
            if (!eventsToShow.length) {
                container.innerHTML = '<p style="grid-column:1/-1; padding:2rem; text-align:center;">No other events to show.</p>';
                return;
            }
            
            let html = '';
            eventsToShow.forEach(ev => {
                const imgSrc = generateEventImage(ev.name, false);
                html += `
                    <div class="event-card">
                        <img class="card-img" src="${imgSrc}" alt="${ev.name}">
                        <div class="card-content">
                            <h3>${ev.name}</h3>
                            <div class="card-meta">
                                <span>📍 ${ev.location}</span>
                                <span>📅 ${new Date(ev.date).toLocaleDateString('en-PH', { month: 'short', day: 'numeric' })}</span>
                            </div>
                            <div class="card-desc">${ev.desc}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Initial render
        renderFeatured(weekEvents, 'featuredWeek');
        renderGrid(weekEvents, 'weekGrid', true);
        renderFeatured(monthEvents, 'featuredMonth');
        renderGrid(monthEvents, 'monthGrid', true);

        // Tab functionality
        const weekPanel = document.getElementById('weekPanel');
        const monthPanel = document.getElementById('monthPanel');
        const tabWeek = document.getElementById('tabWeek');
        const tabMonth = document.getElementById('tabMonth');

        tabWeek.addEventListener('click', () => {
            tabWeek.classList.add('active');
            tabMonth.classList.remove('active');
            weekPanel.classList.add('active-panel');
            monthPanel.classList.remove('active-panel');
        });

        tabMonth.addEventListener('click', () => {
            tabMonth.classList.add('active');
            tabWeek.classList.remove('active');
            monthPanel.classList.add('active-panel');
            weekPanel.classList.remove('active-panel');
        });

        // Email subscription
        document.getElementById('subscribeBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            if (email && email.includes('@') && email.includes('.')) {
                alert('📧 Thanks! You\'ll get San ang G! event updates.');
                document.getElementById('emailInput').value = '';
            } else {
                alert('Please enter a valid email address');
            }
        });

        document.getElementById('emailInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('subscribeBtn').click();
            }
        });

    })();
</script>
</body>
</html>
