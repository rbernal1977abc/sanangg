        // Function to generate Google Calendar URL
        function getGoogleCalendarUrl(event) {
            const startDate = event.startDate.replace(/-/g, '');
            const endDate = event.endDate ? event.endDate.replace(/-/g, '') : startDate;
            
            let details = `${event.name}\n\n${event.longDesc || event.desc}\n\nOrganizer: ${event.organizer || 'TBA'}`;
            
            return `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(event.name)}&dates=${startDate}/${endDate}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(event.location)}`;
        }

DESCRIPTION:${event.longDesc || event.desc}
LOCATION:${event.location}
END:VEVENT
END:VCALENDAR`;

            const blob = new Blob([icsContent], { type: 'text/calendar' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${event.name.replace(/\s+/g, '_')}.ics`;
            a.click();
        }

        // Modal functions
        window.openModal = function(event) {
            document.getElementById('modalTitle').textContent = event.name;
            document.getElementById('modalLocation').textContent = event.location;
            document.getElementById('modalDate').textContent = event.date;
            document.getElementById('modalDesc').textContent = event.longDesc || event.desc;
            document.getElementById('modalLink').href = event.infoUrl || '#';
            
            const modal = document.getElementById('eventModal');
            modal.classList.add('active');
            
            // Set up calendar button
            document.getElementById('modalCalendarBtn').onclick = function() {
                if (/iPhone|iPad|iPod|Mac/i.test(navigator.userAgent)) {
                    downloadIcs(event);
                } else {
                    window.open(getGoogleCalendarUrl(event), '_blank');
                }
            };
            
            document.getElementById('modalInfoBtn').href = event.infoUrl || '#';
        };

        window.closeModal = function() {
            document.getElementById('eventModal').classList.remove('active');
        };

        // Click outside to close
        window.onclick = function(event) {
            const modal = document.getElementById('eventModal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // Get featured events (big events)
        const bigEvents = events.filter(ev => ev.big === true);

        // Render featured event for week panel
        function renderFeaturedWeek() {
            const container = document.getElementById('featuredWeek');
            const featured = bigEvents[0];
            
            container.innerHTML = `
                <div onclick="openModal(${JSON.stringify(featured).replace(/"/g, '&quot;')})" style="cursor: pointer;">
                    <img class="featured-img" src="${featured.image}" alt="${featured.name}">
                    <div class="featured-content">
                        <h2>${featured.name}</h2>
                        <div class="event-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${featured.location}</span>
                            <span><i class="fas fa-calendar"></i> ${featured.date}</span>
                        </div>
                        <div class="desc">${featured.desc}</div>
                        <div class="event-actions">
                            <button class="action-btn info-btn" onclick="event.stopPropagation(); window.open('${featured.infoUrl}', '_blank')">
                                <i class="fas fa-info-circle"></i> Full Details
                            </button>
                            <button class="action-btn calendar-btn" onclick="event.stopPropagation(); window.open('${getGoogleCalendarUrl(featured)}', '_blank')">
                                <i class="fas fa-calendar-plus"></i> Add to Calendar
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render featured event for month panel
        function renderFeaturedMonth() {
            const container = document.getElementById('featuredMonth');
            const featured = bigEvents[1];
            
            container.innerHTML = `
                <div onclick="openModal(${JSON.stringify(featured).replace(/"/g, '&quot;')})" style="cursor: pointer;">
                    <img class="featured-img" src="${featured.image}" alt="${featured.name}">
                    <div class="featured-content">
                        <h2>${featured.name}</h2>
                        <div class="event-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${featured.location}</span>
                            <span><i class="fas fa-calendar"></i> ${featured.date}</span>
                        </div>
                        <div class="desc">${featured.desc}</div>
                        <div class="event-actions">
                            <button class="action-btn info-btn" onclick="event.stopPropagation(); window.open('${featured.infoUrl}', '_blank')">
                                <i class="fas fa-info-circle"></i> Full Details
                            </button>
                            <button class="action-btn calendar-btn" onclick="event.stopPropagation(); window.open('${getGoogleCalendarUrl(featured)}', '_blank')">
                                <i class="fas fa-calendar-plus"></i> Add to Calendar
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render grid for week panel
        function renderWeekGrid() {
            const container = document.getElementById('weekGrid');
            const featured = bigEvents[0];
            const otherEvents = events.filter(ev => ev.name !== featured.name).slice(0, 8);
            
            let html = '';
            otherEvents.forEach(ev => {
                const eventData = JSON.stringify(ev).replace(/"/g, '&quot;');
                html += `
                    <div class="event-card" onclick="openModal(${eventData})">
                        <img class="card-img" src="${ev.thumbnail || ev.image}" alt="${ev.name}" loading="lazy">
                        <div class="card-content">
                            <h3>${ev.name}</h3>
                            <div class="card-meta">
                                <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
                                <span><i class="fas fa-calendar"></i> ${ev.date}</span>
                            </div>
                            <div class="card-desc">${ev.desc.substring(0, 100)}...</div>
                            <div class="card-actions" onclick="event.stopPropagation()">
                                <button class="card-action-btn card-info-btn" onclick="window.open('${ev.infoUrl}', '_blank')">
                                    <i class="fas fa-info-circle"></i> Details
                                </button>
                                <button class="card-action-btn card-calendar-btn" onclick="window.open('${getGoogleCalendarUrl(ev)}', '_blank')">
                                    <i class="fas fa-calendar-plus"></i> Calendar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Render grid for month panel
        function renderMonthGrid() {
            const container = document.getElementById('monthGrid');
            const featured = bigEvents[1];
            const otherEvents = events.filter(ev => ev.name !== featured.name).slice(0, 10);
            
            let html = '';
            otherEvents.forEach(ev => {
                const eventData = JSON.stringify(ev).replace(/"/g, '&quot;');
                html += `
                    <div class="event-card" onclick="openModal(${eventData})">
                        <img class="card-img" src="${ev.thumbnail || ev.image}" alt="${ev.name}" loading="lazy">
                        <div class="card-content">
                            <h3>${ev.name}</h3>
                            <div class="card-meta">
                                <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
                                <span><i class="fas fa-calendar"></i> ${ev.date}</span>
                            </div>
                            <div class="card-desc">${ev.desc.substring(0, 100)}...</div>
                            <div class="card-actions" onclick="event.stopPropagation()">
                                <button class="card-action-btn card-info-btn" onclick="window.open('${ev.infoUrl}', '_blank')">
                                    <i class="fas fa-info-circle"></i> Details
                                </button>
                                <button class="card-action-btn card-calendar-btn" onclick="window.open('${getGoogleCalendarUrl(ev)}', '_blank')">
                                    <i class="fas fa-calendar-plus"></i> Calendar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Render everything
        renderFeaturedWeek();
        renderFeaturedMonth();
        renderWeekGrid();
        renderMonthGrid();

        // Tab functionality
        const weekPanel = document.getElementById('weekPanel');
        const monthPanel = document.getElementById('monthPanel');
        const tabWeek = document.getElementById('tabWeek');
        const tabMonth = document.getElementById('tabMonth');

        tabWeek.addEventListener('click', () => {
            tabWeek.classList.add('active');
            tabMonth.classList.remove('active');
            weekPanel.classList.add('active-panel');
            monthPanel.classList.remove('active-panel');
        });

        tabMonth.addEventListener('click', () => {
            tabMonth.classList.add('active');
            tabWeek.classList.remove('active');
            monthPanel.classList.add('active-panel');
            weekPanel.classList.remove('active-panel');
        });

        // Email subscription
        document.getElementById('subscribeBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            if (email && email.includes('@') && email.includes('.')) {
                alert('📧 Thanks! You\'ll get Sumaang ang G! event updates.');
                document.getElementById('emailInput').value = '';
            } else {
                alert('Please enter a valid email address');
            }
        });

        document.getElementById('emailInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('subscribeBtn').click();
            }
        });

    })();
</script>
</body>
</html>
