<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumaang ang G! – Philippine Car Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0b0f14;
            color: #e0e4e9;
            line-height: 1.5;
            padding: 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .brand {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #c1232c;
            padding-bottom: 0.75rem;
        }

        .brand h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7c35c, #c1232c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .tag {
            background: #1e2630;
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: #f7c35c;
            border: 1px solid #c1232c;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin: 2rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #1e2630;
            border: none;
            color: #a0aaba;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .tab-btn.active {
            background: #c1232c;
            color: white;
            border-color: #f7c35c;
        }

        .panel {
            display: none;
        }

        .panel.active-panel {
            display: block;
        }

        .featured-event {
            margin-bottom: 2.5rem;
            background: #141b24;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #2e3a47;
        }

        .featured-img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
            border-bottom: 3px solid #c1232c;
        }

        .featured-content {
            padding: 1.8rem 2rem;
        }

        .featured-content h2 {
            font-size: 2.5rem;
            color: #f7c35c;
            margin-bottom: 0.5rem;
        }

        .event-meta {
            display: flex;
            gap: 1.5rem;
            color: #8f9eb2;
            margin: 0.75rem 0 1rem;
            flex-wrap: wrap;
        }

        .desc {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 3rem;
        }

        .event-card {
            background: #121a22;
            border-radius: 24px;
            border: 1px solid #283340;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .event-card:hover {
            transform: scale(1.02);
            border-color: #c1232c;
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 1.2rem;
        }

        .card-content h3 {
            color: #f0d9a8;
            margin-bottom: 0.4rem;
            font-size: 1.3rem;
        }

        .card-meta {
            display: flex;
            gap: 1rem;
            color: #8f9eb2;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        .card-desc {
            color: #b6c5d9;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .signup-area {
            background: linear-gradient(145deg, #10171f, #1b2530);
            border-radius: 60px;
            padding: 2rem 2.5rem;
            margin: 2rem 0 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            border: 1px solid #c1232c40;
        }

        .signup-text {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .signup-text span {
            background: #c1232c;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: white;
        }

        .email-form {
            display: flex;
            gap: 0.5rem;
            flex: 1 1 300px;
        }

        .email-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: none;
            background: #26313e;
            color: white;
            outline: none;
        }

        .email-input:focus {
            outline: 2px solid #f7c35c;
        }

        .email-btn {
            background: #f7c35c;
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .email-btn:hover {
            background: #ffd57a;
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
            border-top: 1px solid #2a3645;
            color: #8f9eb2;
        }

        .footer strong {
            color: #f7c35c;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Brand with updated name -->
    <div class="brand">
        <h1>Sumaang ang G!</h1>
        <div class="tag">Philippine Car Events</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" id="tabWeek">🔥 7-day events</button>
        <button class="tab-btn" id="tabMonth">📅 30 days before & after</button>
    </div>

    <!-- Week Panel -->
    <div id="weekPanel" class="panel active-panel">
        <div class="featured-event" id="featuredWeek"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">‣ other events this week</h2>
        <div class="events-grid" id="weekGrid"></div>
    </div>

    <!-- Month Panel -->
    <div id="monthPanel" class="panel">
        <div class="featured-event" id="featuredMonth"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">‣ more around this month</h2>
        <div class="events-grid" id="monthGrid"></div>
    </div>

    <!-- Email Signup with updated name -->
    <div class="signup-area">
        <div class="signup-text">
            📧 Get event updates <span>Sumaang ang G!</span>
        </div>
        <div class="email-form">
            <input type="email" class="email-input" placeholder="your@email.ph" id="emailInput">
            <button class="email-btn" id="subscribeBtn">Subscribe</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Designed & Developed by <strong>RP8</strong>
    </div>
</div>

            {

                location: "Angeles City", 
                date: "March 25, 2026",
                desc: "European cars: BMW, Audi, Mercedes, Porsche, Volvo, and more. Coffee and cars style event.",
                big: false,
                image: "https://images.unsplash.com/photo-1614200187524-dc4b892acf16?w=400&h=200&fit=crop"
            },
            { 
                name: "Rizal Retro Meet", 
                location: "Antipolo", 
                date: "March 26, 2026",
                desc: "Classic Japanese cars from the 80s and 90s. Vintage market, food, and car accessories for sale.",
                big: false,
                image: "https://images.unsplash.com/photo-1489824904134-891ab64532f1?w=400&h=200&fit=crop"
            },
            { 
                name: "Island Invasion 4x4", 
                location: "Palawan", 
                date: "March 27-29, 2026",
                desc: "Off-road beach camping and convoy. 3-day event with trails, beach, and night parties.",
                big: false,
                image: "https://images.unsplash.com/photo-1506968186497-3dee41a4c43b?w=400&h=200&fit=crop"
            },
            { 
                name: "Luzon Drift Challenge", 
                location: "Carmona, Cavite", 
                date: "March 28, 2026",
                desc: "Amateur drift cup with cash prizes. Open to all RWD cars. Practice and competition.",
                big: false,
                image: "https://images.unsplash.com/photo-1601415438339-8a95d348a1d6?w=400&h=200&fit=crop"
            }
        ];

        // Get featured events (big events)
        const bigEvents = events.filter(ev => ev.big === true);

        // Render featured event for week panel
        function renderFeaturedWeek() {
            const container = document.getElementById('featuredWeek');
            const featured = bigEvents[0];
            
            container.innerHTML = `
                <div>
                    <img class="featured-img" src="${featured.image}" alt="${featured.name}">
                    <div class="featured-content">
                        <h2>${featured.name}</h2>
                        <div class="event-meta">
                            <span>📍 ${featured.location}</span>
                            <span>📅 ${featured.date}</span>
                        </div>
                        <div class="desc">${featured.desc}</div>
                    </div>
                </div>
            `;
        }

        // Render featured event for month panel
        function renderFeaturedMonth() {
            const container = document.getElementById('featuredMonth');
            const featured = bigEvents[1];
            
            container.innerHTML = `
                <div>
                    <img class="featured-img" src="${featured.image}" alt="${featured.name}">
                    <div class="featured-content">
                        <h2>${featured.name}</h2>
                        <div class="event-meta">
                            <span>📍 ${featured.location}</span>
                            <span>📅 ${featured.date}</span>
                        </div>
                        <div class="desc">${featured.desc}</div>
                    </div>
                </div>
            `;
        }

        // Render grid for week panel
        function renderWeekGrid() {
            const container = document.getElementById('weekGrid');
            const featured = bigEvents[0];
            const otherEvents = events.filter(ev => ev.name !== featured.name).slice(0, 8);
            
            let html = '';
            otherEvents.forEach(ev => {
                const imgSrc = ev.thumbnail || ev.image;
                html += `
                    <div class="event-card">
                        <img class="card-img" src="${imgSrc}" alt="${ev.name}" loading="lazy">
                        <div class="card-content">
                            <h3>${ev.name}</h3>
                            <div class="card-meta">
                                <span>📍 ${ev.location}</span>
                                <span>📅 ${ev.date}</span>
                            </div>
                            <div class="card-desc">${ev.desc.substring(0, 100)}...</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Render grid for month panel
        function renderMonthGrid() {
            const container = document.getElementById('monthGrid');
            const featured = bigEvents[1];
            const otherEvents = events.filter(ev => ev.name !== featured.name).slice(0, 10);
            
            let html = '';
            otherEvents.forEach(ev => {
                const imgSrc = ev.thumbnail || ev.image;
                html += `
                    <div class="event-card">
                        <img class="card-img" src="${imgSrc}" alt="${ev.name}" loading="lazy">
                        <div class="card-content">
                            <h3>${ev.name}</h3>
                            <div class="card-meta">
                                <span>📍 ${ev.location}</span>
                                <span>📅 ${ev.date}</span>
                            </div>
                            <div class="card-desc">${ev.desc.substring(0, 100)}...</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Render everything
        renderFeaturedWeek();
        renderFeaturedMonth();
        renderWeekGrid();
        renderMonthGrid();

        // Tab functionality
        const weekPanel = document.getElementById('weekPanel');
        const monthPanel = document.getElementById('monthPanel');
        const tabWeek = document.getElementById('tabWeek');
        const tabMonth = document.getElementById('tabMonth');

        tabWeek.addEventListener('click', () => {
            tabWeek.classList.add('active');
            tabMonth.classList.remove('active');
            weekPanel.classList.add('active-panel');
            monthPanel.classList.remove('active-panel');
        });

        tabMonth.addEventListener('click', () => {
            tabMonth.classList.add('active');
            tabWeek.classList.remove('active');
            monthPanel.classList.add('active-panel');
            weekPanel.classList.remove('active-panel');
        });

        // Email subscription
        document.getElementById('subscribeBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            if (email && email.includes('@') && email.includes('.')) {
                alert('📧 Thanks! You\'ll get Sumaang ang G! event updates.');
                document.getElementById('emailInput').value = '';
            } else {
                alert('Please enter a valid email address');
            }
        });

        document.getElementById('emailInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('subscribeBtn').click();
            }
        });

    })();
</script>
</body>
</html>
