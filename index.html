<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumaang ang G! – Philippine Car Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0b0f14;
            color: #e0e4e9;
            line-height: 1.5;
            padding: 1.5rem 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #c1232c;
            padding-bottom: 0.75rem;
        }

        .brand h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7c35c, #c1232c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .tag {
            background: #1e2630;
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: #f7c35c;
            border: 1px solid #c1232c;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin: 2rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #1e2630;
            border: none;
            color: #a0aaba;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #c1232c;
            color: white;
            border-color: #f7c35c;
        }

        .tab-btn:hover {
            background: #2f3b4a;
            color: white;
        }

        .panel {
            display: none;
        }

        .panel.active-panel {
            display: block;
        }

        .featured-event {
            margin-bottom: 2.5rem;
            background: #141b24;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #2e3a47;
            box-shadow: 0 12px 30px -8px black;
        }

        .featured-img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
            border-bottom: 3px solid #c1232c;
        }

        .featured-content {
            padding: 1.8rem 2rem;
        }

        .featured-content h2 {
            font-size: 2.5rem;
            color: #f7c35c;
            margin-bottom: 0.5rem;
        }

        .event-meta {
            display: flex;
            gap: 1.5rem;
            color: #8f9eb2;
            margin: 0.75rem 0 1rem;
            flex-wrap: wrap;
        }

        .event-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .desc {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .event-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .info-btn {
            background: #2f3b4a;
            color: white;
        }

        .calendar-btn {
            background: #f7c35c;
            color: #0f1a24;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 3rem;
        }

        .event-card {
            background: #121a22;
            border-radius: 24px;
            border: 1px solid #283340;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .event-card:hover {
            transform: scale(1.02);
            border-color: #c1232c;
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 1.2rem;
        }

        .card-content h3 {
            color: #f0d9a8;
            margin-bottom: 0.4rem;
            font-size: 1.3rem;
        }

        .card-meta {
            display: flex;
            gap: 1rem;
            color: #8f9eb2;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        .card-desc {
            color: #b6c5d9;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .card-action-btn {
            flex: 1;
            padding: 0.5rem;
            border-radius: 30px;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .card-action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .card-info-btn {
            background: #2f3b4a;
            color: white;
        }

        .card-calendar-btn {
            background: #f7c35c;
            color: #0f1a24;
        }

        .signup-area {
            background: linear-gradient(145deg, #10171f, #1b2530);
            border-radius: 60px;
            padding: 2rem 2.5rem;
            margin: 2rem 0 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            border: 1px solid #c1232c40;
        }

        .signup-text {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .signup-text span {
            background: #c1232c;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: white;
        }

        .email-form {
            display: flex;
            gap: 0.5rem;
            flex: 1 1 300px;
        }

        .email-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: none;
            background: #26313e;
            color: white;
            outline: none;
        }

        .email-input:focus {
            outline: 2px solid #f7c35c;
        }

        .email-btn {
            background: #f7c35c;
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .email-btn:hover {
            background: #ffd57a;
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
            border-top: 1px solid #2a3645;
            color: #8f9eb2;
        }

        .footer strong {
            color: #f7c35c;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <h1>Sumaang ang G!</h1>
        <div class="tag">Philippine Car Events</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabWeek">🔥 7-day events</button>
        <button class="tab-btn" id="tabMonth">📅 30 days before & after</button>
    </div>

    <div id="weekPanel" class="panel active-panel">
        <div class="featured-event" id="featuredWeek"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">‣ other events this week</h2>
        <div class="events-grid" id="weekGrid"></div>
    </div>

    <div id="monthPanel" class="panel">
        <div class="featured-event" id="featuredMonth"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">‣ more around this month</h2>
        <div class="events-grid" id="monthGrid"></div>
    </div>

    <div class="signup-area">
        <div class="signup-text">
            📧 Get event updates <span>Sumaang ang G!</span>
        </div>
        <div class="email-form">
            <input type="email" class="email-input" placeholder="your@email.ph" id="emailInput">
            <button class="email-btn" id="subscribeBtn">Subscribe</button>
        </div>
    </div>

    <div class="footer">
        Designed & Developed by <strong>RP8</strong>
    </div>
</div>

<script>
    // REAL PHILIPPINE CAR EVENTS WITH CORRECT DATES AND LINKS
    const events = [
        // BIG FEATURED EVENTS - CORRECTED MIAS DATE TO APRIL 9-12
        { 
            name: "Manila International Auto Show 2026", 
            location: "World Trade Center & PTTC, Pasay", 
            date: "April 9-12, 2026",
            desc: "The biggest car show in the Philippines with 500+ exhibitors, concept cars, and celebrity guests. Theme: 'Powering Mobility'.",
            longDesc: "The 21st Manila International Auto Show (MIAS) features the Mobility Marathon with new model launches, Test Drive Avenue, Truck Zone, Die-Cast Car Collection, Car Club Display, and the MIAS Petron Custom and Classic Car Competition.",
            big: true,
            image: "https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=1200&h=500&fit=crop",
            thumbnail: "https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=400&h=200&fit=crop",
            link: "https://manilaautoshow.com/",
            startDate: "2026-04-09",
            endDate: "2026-04-12"
        },
        { 
            name: "TGR Philippine Cup - Race Weekend 1", 
            location: "Riverpark, General Trias, Cavite", 
            date: "March 13-15, 2026",
            desc: "Season opener featuring the new Tamaraw OMR one-make race car. Free admission!",
            longDesc: "The 2026 TOYOTA GAZOO Racing Philippine Cup begins with a street race at Riverpark. Watch the debut of the Next Generation Tamaraw OMR alongside the Vios OMR in Sprint Races. Includes GR vehicle displays and sim racing rigs.",
            big: true,
            image: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=1200&h=500&fit=crop",
            thumbnail: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400&h=200&fit=crop",
            link: "https://www.tgrphcup.com/",
            startDate: "2026-03-13",
            endDate: "2026-03-15"
        },
        // REGULAR EVENTS
        { 
            name: "Ford Island Conquest - SM Clark", 
            location: "SM Clark, Angeles, Pampanga", 
            date: "March 6-8, 2026",
            desc: "Test drive Ford vehicles including Everest, Territory Hybrid, Mustang Mach-E, Bronco, and Ranger.",
            longDesc: "Experience the full Ford lineup with test drives, event-exclusive promos, and cash discounts up to P100,000. Free admission from 10am to 9pm.",
            big: false,
            image: "https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=400&h=200&fit=crop",
            link: "https://www.ford.com.ph/",
            startDate: "2026-03-06",
            endDate: "2026-03-08"
        },
        { 
            name: "UAAGI On the Move 2026", 
            location: "SM MOA Central Atrium, Pasay", 
            date: "February 26 - March 1, 2026",
            desc: "Multi-brand showcase: BAIC, Chery, Foton, Jetour, Lynk & Co, and Radar. Test drive over 20 models.",
            longDesc: "One-stop shop for car buyers with test drives, event-exclusive promos, on-the-spot bank approvals, and trade-in facility.",
            big: false,
            image: "https://images.unsplash.com/photo-1553440569-bcc63803a83d?w=400&h=200&fit=crop",
            link: "https://www.uaagi.com/",
            startDate: "2026-02-26",
            endDate: "2026-03-01"
        },
        { 
            name: "PTTC MIAS Expansion Venue", 
            location: "Philippine Trade Training Center, Pasay", 
            date: "April 9-12, 2026",
            desc: "Additional 22,500 sqm of exhibition space with nearly 100 extra vehicles and dedicated food court.",
            longDesc: "The PTTC returns as a secondary venue for MIAS 2026, connected to WTC via air-conditioned walkway. Features additional car displays and food stalls.",
            big: false,
            image: "https://images.unsplash.com/photo-1600712242805-3e374b0c6ffb?w=400&h=200&fit=crop",
            link: "https://manilaautoshow.com/",
            startDate: "2026-04-09",
            endDate: "2026-04-12"
        },
        { 
            name: "TGR Philippine Cup - Tamaraw Debut", 
            location: "Riverpark, Cavite", 
            date: "March 13-15, 2026",
            desc: "First official circuit race for the Next Generation Tamaraw OMR. Free passes available online.",
            longDesc: "Watch the Tamaraw Racing Class debut alongside Vios OMR in Sprint Races. Features 30 racers including TMP President Masando Hashimoto.",
            big: false,
            image: "https://images.unsplash.com/photo-1601369561303-85a36d229bbf?w=400&h=200&fit=crop",
            link: "https://www.tgrphcup.com/",
            startDate: "2026-03-13",
            endDate: "2026-03-15"
        }
    ];

    // Get featured events (big events)
    const bigEvents = events.filter(ev => ev.big === true);

    // Calendar function with correct dates
    window.addToCalendar = function(name, dateRange, location, startDate, endDate) {
        // Parse dates for Google Calendar
        const start = startDate.replace(/-/g, '');
        const end = endDate ? endDate.replace(/-/g, '') : start;
        
        const googleUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(name)}&dates=${start}/${end}&details=${encodeURIComponent(name + ' at ' + location)}&location=${encodeURIComponent(location)}`;
        window.open(googleUrl, '_blank', 'noopener,noreferrer');
        return false;
    };

    // Render functions with working links
    function renderFeaturedWeek() {
        const container = document.getElementById('featuredWeek');
        const featured = bigEvents[0];
        
        container.innerHTML = `
            <div>
                <img class="featured-img" src="${featured.image}" alt="${featured.name}" onerror="this.src='https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=1200&h=500&fit=crop'">
                <div class="featured-content">
                    <h2>${featured.name}</h2>
                    <div class="event-meta">
                        <span><i class="fas fa-map-marker-alt"></i> ${featured.location}</span>
                        <span><i class="fas fa-calendar"></i> ${featured.date}</span>
                    </div>
                    <div class="desc">${featured.longDesc || featured.desc}</div>
                    <div class="event-actions">
                        <a href="${featured.link}" target="_blank" rel="noopener noreferrer" class="action-btn info-btn" onclick="event.stopPropagation()">
                            <i class="fas fa-info-circle"></i> Official Website
                        </a>
                        <a href="#" class="action-btn calendar-btn" onclick="addToCalendar('${featured.name}', '${featured.date}', '${featured.location}', '${featured.startDate}', '${featured.endDate}'); event.preventDefault(); event.stopPropagation();">
                            <i class="fas fa-calendar-plus"></i> Add to Calendar
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    function renderFeaturedMonth() {
        const container = document.getElementById('featuredMonth');
        const featured = bigEvents[1] || bigEvents[0];
        
        container.innerHTML = `
            <div>
                <img class="featured-img" src="${featured.image}" alt="${featured.name}" onerror="this.src='https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=1200&h=500&fit=crop'">
                <div class="featured-content">
                    <h2>${featured.name}</h2>
                    <div class="event-meta">
                        <span><i class="fas fa-map-marker-alt"></i> ${featured.location}</span>
                        <span><i class="fas fa-calendar"></i> ${featured.date}</span>
                    </div>
                    <div class="desc">${featured.longDesc || featured.desc}</div>
                    <div class="event-actions">
                        <a href="${featured.link}" target="_blank" rel="noopener noreferrer" class="action-btn info-btn" onclick="event.stopPropagation()">
                            <i class="fas fa-info-circle"></i> Official Website
                        </a>
                        <a href="#" class="action-btn calendar-btn" onclick="addToCalendar('${featured.name}', '${featured.date}', '${featured.location}', '${featured.startDate}', '${featured.endDate}'); event.preventDefault(); event.stopPropagation();">
                            <i class="fas fa-calendar-plus"></i> Add to Calendar
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    function renderWeekGrid() {
        const container = document.getElementById('weekGrid');
        const featured = bigEvents[0];
        // For week view, show events happening in March (current month)
        const weekEvents = events.filter(ev => ev.date.includes('March')).slice(0, 4);
        
        let html = '';
        weekEvents.forEach(ev => {
            html += `
                <div class="event-card">
                    <img class="card-img" src="${ev.thumbnail}" alt="${ev.name}" onerror="this.src='https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400&h=200&fit=crop'">
                    <div class="card-content">
                        <h3>${ev.name}</h3>
                        <div class="card-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
                            <span><i class="fas fa-calendar"></i> ${ev.date}</span>
                        </div>
                        <div class="card-desc">${ev.desc}</div>
                        <div class="card-actions">
                            <a href="${ev.link}" target="_blank" rel="noopener noreferrer" class="card-action-btn card-info-btn" onclick="event.stopPropagation()">
                                <i class="fas fa-info-circle"></i> Website
                            </a>
                            <a href="#" class="card-action-btn card-calendar-btn" onclick="addToCalendar('${ev.name}', '${ev.date}', '${ev.location}', '${ev.startDate}', '${ev.endDate}'); event.preventDefault(); event.stopPropagation();">
                                <i class="fas fa-calendar-plus"></i> Calendar
                            </a>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderMonthGrid() {
        const container = document.getElementById('monthGrid');
        const featured = bigEvents[1] || bigEvents[0];
        // For month view, show all events except the featured one
        const monthEvents = events.filter(ev => ev.name !== featured.name).slice(0, 6);
        
        let html = '';
        monthEvents.forEach(ev => {
            html += `
                <div class="event-card">
                    <img class="card-img" src="${ev.thumbnail}" alt="${ev.name}" onerror="this.src='https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400&h=200&fit=crop'">
                    <div class="card-content">
                        <h3>${ev.name}</h3>
                        <div class="card-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
                            <span><i class="fas fa-calendar"></i> ${ev.date}</span>
                        </div>
                        <div class="card-desc">${ev.desc}</div>
                        <div class="card-actions">
                            <a href="${ev.link}" target="_blank" rel="noopener noreferrer" class="card-action-btn card-info-btn" onclick="event.stopPropagation()">
                                <i class="fas fa-info-circle"></i> Website
                            </a>
                            <a href="#" class="card-action-btn card-calendar-btn" onclick="addToCalendar('${ev.name}', '${ev.date}', '${ev.location}', '${ev.startDate}', '${ev.endDate}'); event.preventDefault(); event.stopPropagation();">
                                <i class="fas fa-calendar-plus"></i> Calendar
                            </a>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // Render everything
    renderFeaturedWeek();
    renderFeaturedMonth();
    renderWeekGrid();
    renderMonthGrid();

    // Tab switching
    document.getElementById('tabWeek').addEventListener('click', function() {
        document.getElementById('tabWeek').classList.add('active');
        document.getElementById('tabMonth').classList.remove('active');
        document.getElementById('weekPanel').classList.add('active-panel');
        document.getElementById('monthPanel').classList.remove('active-panel');
    });

    document.getElementById('tabMonth').addEventListener('click', function() {
        document.getElementById('tabMonth').classList.add('active');
        document.getElementById('tabWeek').classList.remove('active');
        document.getElementById('monthPanel').classList.add('active-panel');
        document.getElementById('weekPanel').classList.remove('active-panel');
    });

    // Email subscription
    document.getElementById('subscribeBtn').addEventListener('click', function() {
        const email = document.getElementById('emailInput').value.trim();
        if (email && email.includes('@') && email.includes('.')) {
            alert('Thanks! You\'ll get Sumaang ang G! event updates with accurate event information.');
            document.getElementById('emailInput').value = '';
        } else {
            alert('Please enter a valid email address');
        }
    });

    document.getElementById('emailInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('subscribeBtn').click();
        }
    });
</script>
</body>
</html>
