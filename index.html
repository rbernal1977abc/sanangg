<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumaang ang G! – Philippine Car Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0b0f14;
            color: #e0e4e9;
            line-height: 1.5;
            padding: 1.5rem 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #c1232c;
            padding-bottom: 0.75rem;
        }

        .brand h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7c35c, #c1232c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .tag {
            background: #1e2630;
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: #f7c35c;
            border: 1px solid #c1232c;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin: 2rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #1e2630;
            border: none;
            color: #a0aaba;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .tab-btn.active {
            background: #c1232c;
            color: white;
            border-color: #f7c35c;
        }

        .panel {
            display: none;
        }

        .panel.active-panel {
            display: block;
        }

        .featured-event {
            margin-bottom: 2.5rem;
            background: #141b24;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #2e3a47;
        }

        .featured-img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
            border-bottom: 3px solid #c1232c;
        }

        .featured-content {
            padding: 1.8rem 2rem;
        }

        .featured-content h2 {
            font-size: 2.5rem;
            color: #f7c35c;
            margin-bottom: 0.5rem;
        }

        .event-meta {
            display: flex;
            gap: 1.5rem;
            color: #8f9eb2;
            margin: 0.75rem 0 1rem;
            flex-wrap: wrap;
        }

        .event-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .desc {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .event-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .info-btn {
            background: #2f3b4a;
            color: white;
        }

        .calendar-btn {
            background: #f7c35c;
            color: #0f1a24;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 3rem;
        }

        .event-card {
            background: #121a22;
            border-radius: 24px;
            border: 1px solid #283340;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 1.2rem;
        }

        .card-content h3 {
            color: #f0d9a8;
            margin-bottom: 0.4rem;
            font-size: 1.3rem;
        }

        .card-meta {
            display: flex;
            gap: 1rem;
            color: #8f9eb2;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        .card-desc {
            color: #b6c5d9;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .card-action-btn {
            flex: 1;
            padding: 0.5rem;
            border-radius: 30px;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .card-info-btn {
            background: #2f3b4a;
            color: white;
        }

        .card-calendar-btn {
            background: #f7c35c;
            color: #0f1a24;
        }

        .signup-area {
            background: linear-gradient(145deg, #10171f, #1b2530);
            border-radius: 60px;
            padding: 2rem 2.5rem;
            margin: 2rem 0 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            border: 1px solid #c1232c40;
        }

        .signup-text {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .signup-text span {
            background: #c1232c;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: white;
        }

        .email-form {
            display: flex;
            gap: 0.5rem;
            flex: 1 1 300px;
        }

        .email-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: none;
            background: #26313e;
            color: white;
            outline: none;
        }

        .email-btn {
            background: #f7c35c;
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
            border-top: 1px solid #2a3645;
            color: #8f9eb2;
        }

        .footer strong {
            color: #f7c35c;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <h1>Sumaang ang G!</h1>
        <div class="tag">Philippine Car Events</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabWeek">🔥 7-day events</button>
        <button class="tab-btn" id="tabMonth">📅 30 days before & after</button>
    </div>

    <div id="weekPanel" class="panel active-panel">
        <div class="featured-event" id="featuredWeek"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">‣ other events this week</h2>
        <div class="events-grid" id="weekGrid"></div>
    </div>

    <div id="monthPanel" class="panel">
        <div class="featured-event" id="featuredMonth"></div>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">‣ more around this month</h2>
        <div class="events-grid" id="monthGrid"></div>
    </div>

    <div class="signup-area">
        <div class="signup-text">
            📧 Get event updates <span>Sumaang ang G!</span>
        </div>
        <div class="email-form">
            <input type="email" class="email-input" placeholder="your@email.ph" id="emailInput">
            <button class="email-btn" id="subscribeBtn">Subscribe</button>
        </div>
    </div>

    <div class="footer">
        Designed & Developed by <strong>RP8</strong>
    </div>
</div>

    // Get featured events
    const bigEvents = events.filter(ev => ev.big === true);

    // Render functions
    function renderFeaturedWeek() {
        const container = document.getElementById('featuredWeek');
        const featured = bigEvents[0];
        
        container.innerHTML = `
            <div>
                <img class="featured-img" src="${featured.image}" alt="${featured.name}">
                <div class="featured-content">
                    <h2>${featured.name}</h2>
                    <div class="event-meta">
                        <span><i class="fas fa-map-marker-alt"></i> ${featured.location}</span>
                        <span><i class="fas fa-calendar"></i> ${featured.date}</span>
                    </div>
                    <div class="desc">${featured.desc}</div>
                    <div class="event-actions">
                        <a href="${featured.link}" target="_blank" class="action-btn info-btn">
                            <i class="fas fa-info-circle"></i> Full Details
                        </a>
                        <a href="#" class="action-btn calendar-btn" onclick="addToCalendar('${featured.name}', '${featured.date}', '${featured.location}'); return false;">
                            <i class="fas fa-calendar-plus"></i> Add to Calendar
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    function renderFeaturedMonth() {
        const container = document.getElementById('featuredMonth');
        const featured = bigEvents[1];
        
        container.innerHTML = `
            <div>
                <img class="featured-img" src="${featured.image}" alt="${featured.name}">
                <div class="featured-content">
                    <h2>${featured.name}</h2>
                    <div class="event-meta">
                        <span><i class="fas fa-map-marker-alt"></i> ${featured.location}</span>
                        <span><i class="fas fa-calendar"></i> ${featured.date}</span>
                    </div>
                    <div class="desc">${featured.desc}</div>
                    <div class="event-actions">
                        <a href="${featured.link}" target="_blank" class="action-btn info-btn">
                            <i class="fas fa-info-circle"></i> Full Details
                        </a>
                        <a href="#" class="action-btn calendar-btn" onclick="addToCalendar('${featured.name}', '${featured.date}', '${featured.location}'); return false;">
                            <i class="fas fa-calendar-plus"></i> Add to Calendar
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    function renderWeekGrid() {
        const container = document.getElementById('weekGrid');
        const featured = bigEvents[0];
        const otherEvents = events.filter(ev => ev.name !== featured.name).slice(0, 8);
        
        let html = '';
        otherEvents.forEach(ev => {
            html += `
                <div class="event-card">
                    <img class="card-img" src="${ev.thumbnail}" alt="${ev.name}">
                    <div class="card-content">
                        <h3>${ev.name}</h3>
                        <div class="card-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
                            <span><i class="fas fa-calendar"></i> ${ev.date}</span>
                        </div>
                        <div class="card-desc">${ev.desc}</div>
                        <div class="card-actions">
                            <a href="${ev.link}" target="_blank" class="card-action-btn card-info-btn">
                                <i class="fas fa-info-circle"></i> Details
                            </a>
                            <a href="#" class="card-action-btn card-calendar-btn" onclick="addToCalendar('${ev.name}', '${ev.date}', '${ev.location}'); return false;">
                                <i class="fas fa-calendar-plus"></i> Calendar
                            </a>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderMonthGrid() {
        const container = document.getElementById('monthGrid');
        const featured = bigEvents[1];
        const otherEvents = events.filter(ev => ev.name !== featured.name).slice(0, 10);
        
        let html = '';
        otherEvents.forEach(ev => {
            html += `
                <div class="event-card">
                    <img class="card-img" src="${ev.thumbnail}" alt="${ev.name}">
                    <div class="card-content">
                        <h3>${ev.name}</h3>
                        <div class="card-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
                            <span><i class="fas fa-calendar"></i> ${ev.date}</span>
                        </div>
                        <div class="card-desc">${ev.desc}</div>
                        <div class="card-actions">
                            <a href="${ev.link}" target="_blank" class="card-action-btn card-info-btn">
                                <i class="fas fa-info-circle"></i> Details
                            </a>
                            <a href="#" class="card-action-btn card-calendar-btn" onclick="addToCalendar('${ev.name}', '${ev.date}', '${ev.location}'); return false;">
                                <i class="fas fa-calendar-plus"></i> Calendar
                            </a>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // Calendar function
    window.addToCalendar = function(name, date, location) {
        const text = `${name} at ${location}`;
        const googleUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(name)}&details=${encodeURIComponent(text)}&location=${encodeURIComponent(location)}`;
        window.open(googleUrl, '_blank');
    };

    // Render everything
    renderFeaturedWeek();
    renderFeaturedMonth();
    renderWeekGrid();
    renderMonthGrid();

    // Tab switching
    document.getElementById('tabWeek').addEventListener('click', function() {
        document.getElementById('tabWeek').classList.add('active');
        document.getElementById('tabMonth').classList.remove('active');
        document.getElementById('weekPanel').classList.add('active-panel');
        document.getElementById('monthPanel').classList.remove('active-panel');
    });

    document.getElementById('tabMonth').addEventListener('click', function() {
        document.getElementById('tabMonth').classList.add('active');
        document.getElementById('tabWeek').classList.remove('active');
        document.getElementById('monthPanel').classList.add('active-panel');
        document.getElementById('weekPanel').classList.remove('active-panel');
    });

    // Email subscription
    document.getElementById('subscribeBtn').addEventListener('click', function() {
        const email = document.getElementById('emailInput').value;
        if (email && email.includes('@')) {
            alert('Thanks! You\'ll get Sumaang ang G! event updates.');
            document.getElementById('emailInput').value = '';
        } else {
            alert('Please enter a valid email');
        }
    });

    // Handle image errors
    document.addEventListener('error', function(e) {
        if (e.target.tagName === 'IMG') {
            e.target.src = 'https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400&h=200&fit=crop';
        }
    }, true);
</script>
